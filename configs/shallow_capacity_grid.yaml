task:
  family: shallow_serialized_text
  scenario: shallow capacity grid for Table II and Figure 3
requires_raw_data_not_included: true
seeds: [0, 1, 2]
paths:
  train: "<DATA_NOT_INCLUDED>/train_windows"
  val: "<DATA_NOT_INCLUDED>/val_windows"
  test: "<DATA_NOT_INCLUDED>/test_windows"
  output_dir: outputs/shallow_capacity_grid
representation:
  name: serialized_text
temporalization:
  name: session_coherent
window:
  window_len: 32
  stride: 16
grid:
  d_model: [64, 128, 256]
  layers: [1, 2, 4]
  heads: [2, 4, 8]
fixed:
  pool: mean
  ff_dim: 1024
  max_tokens: 512
optimizer:
  epochs: 20
  batch_size: 256
  lr: 0.001
metrics:
  primary: macro_f1
throughput:
  convention: processed_flow_records_per_sec
report_to: none
